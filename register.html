<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>注册 - 强哥的地盘</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header class="site-header">
    <div class="container">
      <h1 class="logo">强哥的地盘</h1>
      <nav><a class="btn small" href="me.html">返回登录</a></nav>
    </div>
  </header>

  <main class="container account-page">
    <section class="card account-card">
      <h2>注册账号</h2>
      <form id="registerForm">
        <label>昵称<input name="name"></label>
        <label>手机号<input name="phone" required></label>
        <label>密码<input name="password" type="password" required></label>
        <button class="btn" type="submit">注册</button>
      </form>
      <div id="regResult" class="result" aria-live="polite"></div>
      <p class="muted-text">注册成功后会自动返回“我”页面。</p>
    </section>
  </main>

  <footer class="site-footer"><div class="container">© 2026 强哥的地盘</div></footer>

  <script>
    const registerForm = document.getElementById('registerForm');
    const regResult = document.getElementById('regResult');

    registerForm.addEventListener('submit', async event => {
      event.preventDefault();
      const f = new FormData(registerForm);
      const body = {
        name: f.get('name'),
        phone: f.get('phone'),
        password: f.get('password')
      };
      const res = await fetch('/api/register', {
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body:JSON.stringify(body)
      });
      const data = await res.json();
      if(!res.ok){
        regResult.textContent = data.msg === 'phone exists' ? '这个手机号已经注册，请返回登录。' : (data.msg || '注册失败');
        return;
      }
      regResult.textContent = '注册成功，正在返回登录...';
      location.href = '/me.html?registered=1&phone=' + encodeURIComponent(body.phone || '');
    });
  </script>
</body>
</html>
